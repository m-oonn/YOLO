services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: campus-safety:latest
    container_name: campus-safety-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./configs:/app/configs
    environment:
      YOLO_DEVICE: cuda
      API_KEY: ${API_KEY:-}
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      LOG_JSON: ${LOG_JSON:-0}
    gpus: all
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    image: nginx:alpine
    container_name: campus-safety-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
