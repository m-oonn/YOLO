# Default configuration for YOLO Course Design Project
# See docs/CONFIG.md for detailed documentation

model:
  path: "models/yolov8n.pt"   # YOLO model path (supports .pt, .onnx, .engine)
  imgsz: 640                    # Input image size
  conf: 0.35                    # Confidence threshold
  iou: 0.5                      # NMS IoU threshold
  device: "auto"                # auto/cpu/cuda:0

camera:
  fps: 30                       # Camera capture FPS

rules:
  running:
    enabled: true
    speed_px_s: 50              # Speed threshold (px/s)
    min_duration_s: 0.3         # Minimum duration to confirm
    debounce_s: 5.0             # Cooldown between repeat events

  fall:
    enabled: true
    upright_aspect_min: 1.2     # Min aspect ratio (h/w) for upright person
    fallen_aspect_max: 1.0      # Max aspect ratio for fallen person
    transition_window_s: 1.0    # Time window for transition detection
    debounce_s: 5.0             # Cooldown between repeat events

  crowd:
    enabled: true
    min_people: 3               # Minimum people to trigger crowd alert
    proximity_px: 200           # Max distance between clustered people
    debounce_s: 10.0            # Cooldown between repeat events

  intrusion:
    enabled: true
    debounce_s: 5.0             # Cooldown between repeat events
    zones:
      - name: "lab"
        polygon: [[60,60],[580,60],[580,340],[60,340]]

  fight:
    enabled: true
    distance_threshold: 150     # Max distance between two persons (px)
    movement_threshold: 30      # Min movement speed (px/s)
    min_duration_s: 0.5         # Duration to confirm fight
    debounce_s: 5.0             # Cooldown between repeat events

output:
  directory: "outputs"
  save_snapshots: true
  view: true
