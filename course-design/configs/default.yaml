camera:
  fps: 30
  url: ''
mllm:
  alarm_enhance_enabled: true
  enabled: false
  enhancement_cooldown_s: 10.0
  inference_backend: auto
  key_frame_interval: 10
  max_new_tokens: 512
  model_path: models/mllm/qwen2-vl-2b
  model_type: qwen2-vl-2b
  scene_description_enabled: true
  shadow_mode: false
model:
  classes: null
  conf: 0.25
  device: cuda
  half: true
  imgsz: 640
  inference_scale: 1.0
  iou: 0.5
  jpeg_quality: 70
  path: models/yolo11x.pt
  tracker: bytetrack
output:
  directory: outputs
  save_snapshots: true
  view: true
pose:
  enabled: true
  kp_threshold: 0.5
  max_skeletons: 30
  model_path: models/yolo11x-pose.pt
  process_interval: 2
  smoothing_alpha: 0.4
rules:
  crowd:
    debounce_s: 8.0
    enabled: true
    min_duration_s: 1.5
    min_people: 4
    proximity_px: 180.0
  fall:
    confirm_frames: 6
    debounce_s: 5.0
    enabled: true
    fallen_aspect_max: 0.95
    min_aspect_change_rate: 0.1
    transition_window_s: 2.0
    upright_aspect_min: 1.1
  fight:
    chaos_threshold: 60.0
    debounce_s: 5.0
    distance_threshold: 150
    enabled: true
    iou_threshold: 0.05
    min_duration_s: 0.6
    movement_threshold: 30
    required_score: 4
  intrusion:
    debounce_s: 5.0
    enabled: true
    min_duration_s: 1.0
    zones: []
  run:
    enabled: true
  running:
    debounce_s: 5.0
    enabled: true
    min_duration_s: 0.4
    speed_px_s: 350.0
  skeleton:
    crowd:
      debounce_s: 8.0
      density_threshold: 3.5
      enabled: true
      min_duration_s: 3.0
    fall:
      debounce_s: 8.0
      emergency_velocity_px: 1.2
      enabled: true
      fall_velocity_threshold: 0.4
      head_height_threshold: 0.3
      min_duration_s: 0.2
      torso_angle_threshold: 40.0
    fight:
      debounce_s: 5.0
      enabled: true
      limb_frequency_threshold: 3.5
      min_duration_s: 0.6
      proximity_threshold_m: 1.5
      wrist_speed_threshold_ms: 2.2
    intrusion:
      debounce_s: 5.0
      enabled: true
    running:
      debounce_s: 5.0
      enabled: true
      min_duration_s: 0.4
      speed_threshold_kmh: 10.0
  vehicle:
    debounce_s: 10.0
    enabled: false
    min_duration_s: 2.0
    zones: []
