alarm:
  cooldown_s: 30.0
  enabled: true
  sound_enabled: true
camera:
  buffer_size: 30
  fps: 30
  url: ''
mllm:
  alarm_enhance_enabled: true
  enabled: true
  enhancement_cooldown_s: 10.0
  inference_backend: auto
  key_frame_interval: 15
  max_new_tokens: 256
  model_path: models/mllm/qwen2-vl-2b
  model_type: qwen2-vl-2b
  scene_description_enabled: true
  shadow_mode: true
model:
  classes: null
  conf: 0.35
  device: cuda
  imgsz: 640
  inference_scale: 1.0
  iou: 0.5
  jpeg_quality: 80
  path: models/yolo12m.pt
  process_interval: 2
output:
  directory: outputs
  save_snapshots: true
  view: true
pose:
  enabled: true
  kp_threshold: 0.5
  max_skeletons: 50
  process_interval: 2
  smoothing_alpha: 0.3
rules:
  crowd: true
  fall: true
  fight:
    debounce_s: 5.0
    distance_threshold: 150
    enabled: true
    min_duration_s: 0.5
    movement_threshold: 30
  intrusion:
    debounce_s: 5.0
    enabled: true
    zones: []
  run: true
