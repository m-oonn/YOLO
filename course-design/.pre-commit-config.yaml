default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest (backend)
        entry: bash -c 'cd "$(dirname "$0")" && python -m pytest tests/ -x --tb=short -q'
        language: system
        files: ^(core|backend|tests)/.*\.py$
        pass_filenames: false
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint --fix'
        language: system
        files: ^frontend/src/.*\.(js|vue)$
        pass_filenames: true
      - id: prettier
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npx prettier --write'
        language: system
        files: ^frontend/src/.*\.(js|vue|css|json)$
        pass_filenames: true
